<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 06 — Auth & Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem
        }

        .container {
            max-width: 700px;
            width: 100%
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 1.5rem
        }

        /* Login Form */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s
        }

        .login-card.hidden {
            display: none
        }

        .login-card h2 {
            color: #ffd93d;
            margin-bottom: 1rem;
            font-size: 1.2rem
        }

        .form-group {
            margin-bottom: 1rem
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #888
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 1rem;
            outline: none
        }

        .form-group input:focus {
            border-color: #ffd93d
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s
        }

        .btn-login:hover {
            transform: translateY(-2px)
        }

        .login-error {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: 0.5rem
        }

        .login-hint {
            color: #666;
            font-size: 0.8rem;
            margin-top: 1rem
        }

        .login-hint code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px
        }

        /* Chat (after login) */
        .chat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem
        }

        .chat-card.hidden {
            display: none
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1)
        }

        .user-info .name {
            font-weight: 700;
            color: #00e676;
            font-size: 1.1rem
        }

        .user-info .role {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600
        }

        .user-info .role.admin {
            background: rgba(255, 217, 61, 0.2);
            color: #ffd93d
        }

        .user-info .role.user {
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff
        }

        .btn-logout {
            padding: 6px 16px;
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 6px;
            background: transparent;
            color: #ff5252;
            cursor: pointer;
            font-size: 0.8rem
        }

        .token-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            max-height: 60px;
            overflow: hidden;
            color: #888;
            cursor: pointer;
            transition: max-height 0.3s
        }

        .token-display:hover {
            max-height: 200px
        }

        .token-label {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 4px
        }

        .messages {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 0.8rem
        }

        .msg {
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 0.9rem;
            animation: fadeIn 0.3s
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg.system {
            color: #888;
            font-style: italic;
            text-align: center;
            font-size: 0.8rem
        }

        .msg.chat {
            background: rgba(0, 210, 255, 0.08);
            border-left: 3px solid #00d2ff
        }

        .msg.chat .sender {
            color: #00d2ff;
            font-weight: 600
        }

        .msg.error {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.08)
        }

        .input-row {
            display: flex;
            gap: 8px
        }

        .input-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            outline: none
        }

        .input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Chapter 06 — Auth & Security</h1>
        <p class="subtitle">JWT-authenticated WebSocket connections</p>

        <!-- Login Form -->
        <div class="login-card" id="loginCard">
            <h2>🔑 Login to Connect</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" value="demo">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" value="demo">
            </div>
            <button class="btn-login" onclick="login()">🔓 Login & Connect</button>
            <div class="login-error" id="loginError"></div>
            <div class="login-hint">
                <strong>Demo accounts:</strong><br>
                <code>alice / password123</code> (admin) &nbsp;
                <code>bob / password456</code> &nbsp;
                <code>demo / demo</code>
            </div>
        </div>

        <!-- Chat (after auth) -->
        <div class="chat-card hidden" id="chatCard">
            <div class="user-info">
                <div>
                    <span class="name" id="displayName"></span>
                    <span class="role" id="displayRole"></span>
                </div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
            <div class="token-label">🔑 JWT Token (click to expand):</div>
            <div class="token-display" id="tokenDisplay"></div>
            <div class="messages" id="messages"></div>
            <div class="input-row">
                <input type="text" id="chatInput" placeholder="Type a message..."
                    onkeypress="if(event.key==='Enter')sendChat()">
                <button onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let authToken = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';

            try {
                // Step 1: HTTP POST to get JWT token
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.error || 'Login failed';
                    return;
                }

                authToken = data.token;

                // Show token
                document.getElementById('tokenDisplay').textContent = authToken;
                document.getElementById('displayName').textContent = data.username;

                // Step 2: Connect WebSocket WITH token in query parameter
                connectWebSocket(authToken);

                // Show chat UI
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('chatCard').classList.remove('hidden');

            } catch (err) {
                errorEl.textContent = 'Connection failed: ' + err.message;
            }
        }

        function connectWebSocket(token) {
            // Pass JWT as query parameter since browsers don't support
            // custom headers for WebSocket connections
            ws = new WebSocket(`ws://localhost:5000/ws?token=${encodeURIComponent(token)}`);

            ws.onopen = () => addMsg('system', '🟢 WebSocket connected (authenticated)');

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'system' && data.event === 'authenticated') {
                    const roleEl = document.getElementById('displayRole');
                    roleEl.textContent = data.role;
                    roleEl.className = `role ${data.role}`;
                    addMsg('system', data.message);
                } else if (data.type === 'chat') {
                    addMsg('chat', `${data.from}: ${data.text}`);
                } else if (data.type === 'error') {
                    addMsg('error', `⚠️ ${data.message}`);
                } else if (data.type === 'system') {
                    addMsg('system', data.message);
                }
            };

            ws.onclose = () => addMsg('system', '🔴 Disconnected');
            ws.onerror = () => addMsg('error', '❌ Connection error');
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'chat', text }));
                input.value = '';
            }
        }

        function logout() {
            if (ws) ws.close(1000, 'Logout');
            authToken = null;
            document.getElementById('chatCard').classList.add('hidden');
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('messages').innerHTML = '';
        }

        function addMsg(type, text) {
            const div = document.getElementById('messages');
            const el = document.createElement('div');
            el.className = `msg ${type}`;
            el.innerHTML = type === 'chat'
                ? `<span class="sender">${text.split(':')[0]}</span>:${text.substring(text.indexOf(':') + 1)}`
                : text;
            div.appendChild(el);
            div.scrollTop = div.scrollHeight;
        }
    </script>
</body>

</html>
