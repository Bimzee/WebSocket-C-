<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 04 — Broadcasting & Groups</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            padding: 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1)
        }

        h1 {
            font-size: 1.6rem;
            background: linear-gradient(90deg, #00e676, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 0.5rem;
            font-size: 0.85rem
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444
        }

        .dot.on {
            background: #00e676;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(0, 230, 118, 0.3)
            }

            50% {
                box-shadow: 0 0 15px rgba(0, 230, 118, 0.6)
            }
        }

        .layout {
            flex: 1;
            display: flex;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            gap: 1rem
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 1rem
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem
        }

        .panel h3 {
            font-size: 0.85rem;
            color: #00d2ff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .user-item,
        .group-item {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .user-item:hover {
            background: rgba(0, 210, 255, 0.1)
        }

        .group-item:hover {
            background: rgba(0, 230, 118, 0.1)
        }

        .group-item.active {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid rgba(0, 230, 118, 0.3)
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.1)
        }

        /* Name input */
        .name-input {
            display: flex;
            gap: 6px;
            margin-bottom: 0.5rem
        }

        .name-input input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none
        }

        .name-input button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #00d2ff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem
        }

        /* Group join */
        .group-join {
            display: flex;
            gap: 6px;
            margin-top: 0.5rem
        }

        .group-join input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none
        }

        .group-join button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #00e676;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem
        }

        /* Main chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 1rem
        }

        .tab {
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px 8px 0 0;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-bottom-color: transparent
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0 12px 12px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            min-height: 300px;
            max-height: 500px
        }

        .msg {
            margin-bottom: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            font-size: 0.9rem
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg.broadcast {
            background: rgba(0, 210, 255, 0.1);
            border-left: 3px solid #00d2ff
        }

        .msg.group {
            background: rgba(0, 230, 118, 0.1);
            border-left: 3px solid #00e676
        }

        .msg.direct {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107
        }

        .msg.system {
            background: rgba(255, 255, 255, 0.03);
            color: #666;
            font-style: italic;
            text-align: center;
            font-size: 0.8rem
        }

        .msg.self {
            margin-left: 3rem
        }

        .msg-meta {
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 3px
        }

        .msg-sender {
            font-weight: 600;
            color: #00d2ff
        }

        .msg-sender.group-sender {
            color: #00e676
        }

        .msg-sender.dm-sender {
            color: #ffc107
        }

        /* Input */
        .input-bar {
            display: flex;
            gap: 8px;
            margin-top: 1rem
        }

        .input-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none
        }

        .input-bar input:focus {
            border-color: #00d2ff
        }

        .btn-send {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s
        }

        .btn-send:hover {
            transform: translateY(-2px)
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📢 Chapter 04 — Broadcasting & Groups</h1>
        <div class="status-bar">
            <div class="dot" id="dot"></div>
            <span id="statusText">Connecting...</span>
            <span style="color:#7b2ff7;font-weight:600" id="myName"></span>
        </div>
    </div>

    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Set Name -->
            <div class="panel">
                <h3>👤 Your Name</h3>
                <div class="name-input">
                    <input type="text" id="nameInput" placeholder="Enter name...">
                    <button onclick="setName()">Set</button>
                </div>
            </div>

            <!-- Online Users -->
            <div class="panel">
                <h3>🟢 Online Users</h3>
                <div id="userList"></div>
            </div>

            <!-- Groups -->
            <div class="panel">
                <h3>🏠 Groups</h3>
                <div id="groupList"></div>
                <div class="group-join">
                    <input type="text" id="groupInput" placeholder="Group name..."
                        onkeypress="if(event.key==='Enter')joinGroup()">
                    <button onclick="joinGroup()">Join</button>
                </div>
                <button onclick="leaveGroup()"
                    style="width:100%;margin-top:6px;padding:6px;border:1px solid rgba(255,82,82,0.3);border-radius:6px;background:transparent;color:#ff5252;cursor:pointer;font-size:0.8rem">Leave
                    Group</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="tab-bar">
                <div class="tab active" data-mode="broadcast" onclick="selectTab(this)">📢 Broadcast</div>
                <div class="tab" data-mode="group" onclick="selectTab(this)">🏠 Group</div>
                <div class="tab" data-mode="direct" onclick="selectTab(this)">✉️ Direct</div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Type a broadcast message..."
                    onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="btn-send" onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let ws, myId = '', mode = 'broadcast', dmTarget = '';

        window.addEventListener('load', connect);

        function connect() {
            ws = new WebSocket('ws://localhost:5000/ws');
            ws.onopen = () => { document.getElementById('dot').classList.add('on'); document.getElementById('statusText').textContent = 'Connected' };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleMessage(data);
            };
            ws.onclose = () => {
                document.getElementById('dot').classList.remove('on');
                document.getElementById('statusText').textContent = 'Reconnecting...';
                setTimeout(connect, 2000);
            };
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'system':
                    if (data.event === 'welcome') {
                        myId = data.clientId;
                        document.getElementById('myName').textContent = `(${data.name})`;
                        if (data.onlineUsers) renderUsers(data.onlineUsers);
                        if (data.availableGroups) renderGroups(data.availableGroups.map(g => ({ name: g })));
                    }
                    if (data.event === 'name_changed') {
                        if (data.clientId === myId) document.getElementById('myName').textContent = `(${data.newName})`;
                    }
                    addSystemMsg(data.message || data.event);
                    ws.send(JSON.stringify({ type: 'list_users' })); // refresh
                    ws.send(JSON.stringify({ type: 'list_groups' }));
                    break;
                case 'broadcast':
                    addMsg('broadcast', data.name, data.text, data.from === myId);
                    break;
                case 'group_message':
                    addMsg('group', `${data.name} [${data.group}]`, data.text, data.from === myId);
                    break;
                case 'direct_message':
                    const label = data.from === myId ? `You → ${data.to}` : `${data.name} → You`;
                    addMsg('direct', label, data.text, data.from === myId);
                    break;
                case 'user_list':
                    renderUsers(data.users);
                    break;
                case 'group_list':
                    renderGroups(data.groups);
                    break;
                case 'error':
                    addSystemMsg('❌ ' + data.message);
                    break;
            }
        }

        function renderUsers(users) {
            const div = document.getElementById('userList');
            div.innerHTML = '';
            (Array.isArray(users) ? users : []).forEach(u => {
                const el = document.createElement('div');
                el.className = 'user-item';
                el.innerHTML = `<span>${u.id === myId ? '<b>' + u.name + ' (You)</b>' : u.name}</span><span class="badge">${u.group || '—'}</span>`;
                el.onclick = () => { if (u.id !== myId) { dmTarget = u.id; selectTab(document.querySelector('[data-mode="direct"]')); document.getElementById('msgInput').placeholder = `DM to ${u.name}...` } };
                div.appendChild(el);
            });
        }

        function renderGroups(groups) {
            const div = document.getElementById('groupList');
            div.innerHTML = '';
            (Array.isArray(groups) ? groups : []).forEach(g => {
                const el = document.createElement('div');
                el.className = 'group-item';
                el.innerHTML = `<span>${g.name}</span><span class="badge">${g.memberCount || '?'}</span>`;
                el.onclick = () => { document.getElementById('groupInput').value = g.name; joinGroup() };
                div.appendChild(el);
            });
        }

        function selectTab(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            mode = el.dataset.mode;
            const input = document.getElementById('msgInput');
            if (mode === 'broadcast') input.placeholder = 'Type a broadcast message...';
            else if (mode === 'group') input.placeholder = 'Type a group message...';
            else if (mode === 'direct') input.placeholder = dmTarget ? `DM to ${dmTarget}...` : 'Click a user first, then type...';
        }

        function sendMsg() {
            const text = document.getElementById('msgInput').value.trim();
            if (!text || !ws) return;
            if (mode === 'broadcast') ws.send(JSON.stringify({ type: 'broadcast', text }));
            else if (mode === 'group') ws.send(JSON.stringify({ type: 'group_message', text }));
            else if (mode === 'direct' && dmTarget) ws.send(JSON.stringify({ type: 'direct_message', to: dmTarget, text }));
            document.getElementById('msgInput').value = '';
        }

        function setName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name && ws) ws.send(JSON.stringify({ type: 'set_name', name }));
        }

        function joinGroup() {
            const group = document.getElementById('groupInput').value.trim();
            if (group && ws) ws.send(JSON.stringify({ type: 'join_group', group }));
        }

        function leaveGroup() {
            if (ws) ws.send(JSON.stringify({ type: 'leave_group' }));
        }

        function addMsg(cls, sender, text, self = false) {
            const div = document.getElementById('messages');
            const el = document.createElement('div');
            el.className = `msg ${cls} ${self ? 'self' : ''}`;
            el.innerHTML = `<div class="msg-meta">${new Date().toLocaleTimeString()}</div><span class="msg-sender ${cls === 'group' ? 'group-sender' : cls === 'direct' ? 'dm-sender' : ''}">${sender}</span>: ${text}`;
            div.appendChild(el);
            div.scrollTop = div.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.getElementById('messages');
            const el = document.createElement('div');
            el.className = 'msg system';
            el.textContent = text;
            div.appendChild(el);
            div.scrollTop = div.scrollHeight;
        }
    </script>
</body>

</html>
